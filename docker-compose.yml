services:
  app:
    image: php:8.3-fpm
    container_name: btl_ltweb_app
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh ./docker/php/start.sh
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - btl_ltweb

  nginx:
    image: nginx:1.27-alpine
    container_name: btl_ltweb_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - btl_ltweb

  mysql:
    image: mysql:8.0
    container_name: btl_ltweb_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: btl_ltweb
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - btl_ltweb

  node:
    image: node:22-alpine
    container_name: btl_ltweb_node
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "test -d node_modules || npm install; npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    networks:
      - btl_ltweb

  composer:
    image: composer:2
    container_name: btl_ltweb_composer
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - btl_ltweb
    profiles:
      - tools

networks:
  btl_ltweb:
    driver: bridge

volumes:
  mysql_data:
